services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: querymind
      POSTGRES_PASSWORD: querymind_dev
      POSTGRES_DB: querymind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U querymind"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://querymind:querymind_dev@postgres:5432/querymind
      TARGET_DATABASE_URL: postgresql://querymind_readonly:readonly_dev@postgres:5432/querymind
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
