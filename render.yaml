services:
  - type: web
    name: querymind-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TARGET_DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
